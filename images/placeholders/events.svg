<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-labelledby="title desc">
  <title id="title">Events placeholder</title>
  <desc id="desc">Placeholder graphic for event photography images.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#29415a"/>
      <stop offset="100%" stop-color="#152535"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect x="80" y="100" width="640" height="800" rx="24" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)"/>
  <circle cx="240" cy="330" r="56" fill="rgba(255,255,255,0.26)"/>
  <circle cx="400" cy="330" r="56" fill="rgba(255,255,255,0.18)"/>
  <circle cx="560" cy="330" r="56" fill="rgba(255,255,255,0.26)"/>
